{% extends "blog/base.html" %}

{% block content %}
    <h1>{{title}}</h1>
    <ul>
        {% for p in posts %}
            <li>
                <h2>{{p.title}}</h2>
                <p>{{p.content}}</p>
                <a href="{{ p.get_absolute_url }}">Ash meni</a>
                <hr>
            </li>
        {% endfor %}
    </ul>
{% endblock content %}
