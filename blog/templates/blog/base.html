{% load static %}
<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="{% static "blog/css/main.css" %}">
        <title>NurbekTech | {{title}}</title>
    </head>
    <body>
        {% block mainmenu %}
        <header class="header">
            <div class="container">
                <div class="header__nav">
                    <a href="{% url "home" %}" class="logo">NurbekTech</a>
                    <nav class="nav__list">
                        {% for m in menu %}
                        <a href="{% url m.url_name %}" class="nav__link">{{m.title}}</a>
                        {% endfor %}
                    </nav>
                </div>
            </div>
        </header>
        {% endblock mainmenu %} {% block content %}{% endblock content %}
    </body>
</html>
